<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><!-- 背景渐变：采用更符合 Fluent 规范的深蓝到浅蓝过渡 --><linearGradient id="fluent-bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#2899F5"/><stop offset="100%" stop-color="#0078D4"/></linearGradient><!-- 环境阴影：多层阴影营造深度感 -->
<filter id="fluent-shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
  <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
  <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
</filter>
</defs><!-- 主容器：底层的圆角卡片 --><rect width="256" height="256" rx="60" fill="url(#fluent-bg)" filter="url(#fluent-shadow)"/><!-- 电视外壳：带有亚克力半透明感的边框 --><rect x="40" y="48" width="176" height="130" rx="22" fill="white" fill-opacity="0.9"/><!-- 屏幕区域：核心显示区域 --><rect x="52" y="58" width="152" height="108" rx="14" fill="#005A9E"/><!-- 播放按钮 --><circle cx="128" cy="112" r="30" fill="white"/><path d="M141 112L121 123.5L121 100.5L141 112Z" fill="#0078D4"/><!-- 连体式底座：将之前的两个短条合并为一个修长的底座条 --><!-- 这种设计在 Fluent UI 中更具整体感，模拟了电视底部的支撑结构 --><rect x="76" y="196" width="104" height="8" rx="4" fill="white" fill-opacity="0.85"/><!-- 机身与底座之间的微小连接（颈部），增强真实感 --><rect x="124" y="178" width="8" height="18" fill="white" fill-opacity="0.4"/><!-- 顶部高光 --><rect x="60" y="48" width="136" height="1" rx="0.5" fill="white" fill-opacity="0.3"/></svg>