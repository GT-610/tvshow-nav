name: tvshow_nav
description: 电视直播导航

publish_to: 'none'

version: 0.3.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  fluent_ui: ^4.13.0
  window_manager: ^0.5.1

  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  path_provider: ^2.1.5
  path: ^1.9.1

  url_launcher: ^6.3.2

  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  generate: true

flutter_launcher_icons:
  image_path: "assets/app_icon.png"
  windows:
    generate: true
    icon_size: 128
